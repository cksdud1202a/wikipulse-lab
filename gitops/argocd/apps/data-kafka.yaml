# Kafka 클러스터 + 토픽 7개를 배포하는 ArgoCD Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-kafka
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io  # 앱 삭제 시 Kafka 리소스도 함께 정리
spec:
  project: default
  source:
    repoURL: https://github.com/cksdud1202a/wikipulse-lab.git
    targetRevision: main
    path: gitops/manifests/kafka  # 실제 Kafka 리소스가 있는 폴더
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka  # Kafka가 배포될 네임스페이스
  syncPolicy:
    automated:
      prune: true      # GitHub에서 파일 삭제 시 클러스터에서도 삭제
      selfHeal: true   # 클러스터 상태가 Git과 달라지면 자동 복구
    syncOptions:
      - CreateNamespace=true  # kafka 네임스페이스 없으면 자동 생성
